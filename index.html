<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>neskončen papir</title>

  <style>
    body {
      margin: 0;
      background: white;
      overflow: scroll;
      width: 5000px;
      height: 5000px;
      position: relative;
      font-family: Arial, sans-serif;
    }

    .item {
      position: absolute;
      cursor: grab;
    }

    img {
      max-width: 220px;
      user-select: none;
      pointer-events: none;
      display: block;
    }

    .text {
      font-size: 14px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <div class="item" id="item1" style="top:200px; left:200px;">
    <a href="slika1.jpg" target="_blank">
      <img src="slika1.jpg">
    </a>
    <div class="text">tekst 1</div>
  </div>

  <div class="item" id="item2" style="top:600px; left:500px;">
    <a href="slika2.jpg" target="_blank">
      <img src="slika2.jpg">
    </a>
    <div class="text">tekst 2</div>
  </div>

  <script>
    const items = document.querySelectorAll(".item");

    items.forEach(item => {
      let offsetX, offsetY, isDown = false;

      item.addEventListener("mousedown", (e) => {
        isDown = true;
        offsetX = e.clientX - item.offsetLeft;
        offsetY = e.clientY - item.offsetTop;
        item.style.cursor = "grabbing";
      });

      document.addEventListener("mouseup", () => {
        isDown = false;
        item.style.cursor = "grab";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDown) return;

        item.style.left = (e.clientX - offsetX) + "px";
        item.style.top = (e.clientY - offsetY) + "px";
      });
    });
  </script>

</body>
</html>
</html>
